name: CI/CD Enforcement

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pim_user
          POSTGRES_PASSWORD: pim_password
          POSTGRES_DB: beauty_pim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements-dev.txt
          python -m pip install flake8 pip-audit

      - name: Run Pip Integrity Check
        run: |
          python -m pip check

      - name: Run Genuine Runtime Security Scan
        run: |
          pip-audit -r backend/requirements.txt --desc on

      - name: Run Genuine Development Security Scan
        run: |
          pip-audit -r backend/requirements-dev.txt --desc on

      - name: Run Backend Linting
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run SQLite Alembic Migration
        run: |
          cd backend
          rm -f test_migration.db
          DATABASE_URL=sqlite:///./test_migration.db alembic upgrade head
          DATABASE_URL=sqlite:///./test_migration.db alembic current

      - name: Run PostgreSQL Alembic Migration
        run: |
          cd backend
          DATABASE_URL=postgresql://pim_user:pim_password@localhost:5432/beauty_pim_test alembic upgrade head
          DATABASE_URL=postgresql://pim_user:pim_password@localhost:5432/beauty_pim_test alembic current

      - name: Run SQLite Integration Tests
        env:
          SECRET_KEY: testsecretkeytestsecretkeytestsecretkeytestsecretkey
          DATABASE_URL: sqlite:///./test_beauty_pim.db
        run: |
          cd backend
          pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Run PostgreSQL Integration Tests
        env:
          SECRET_KEY: testsecretkeytestsecretkeytestsecretkeytestsecretkey
          DATABASE_URL: postgresql://pim_user:pim_password@localhost:5432/beauty_pim_test
        run: |
          cd backend
          pytest

      - name: Run Backend Smoke Tests
        env:
          SECRET_KEY: testsecretkeytestsecretkeytestsecretkeytestsecretkey
          DATABASE_URL: postgresql://pim_user:pim_password@localhost:5432/beauty_pim_test
        run: |
          cd backend
          python scripts/ci_smoke_test.py

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pim_user
          POSTGRES_PASSWORD: pim_password
          POSTGRES_DB: beauty_pim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run TypeScript Type Check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run Frontend Linting
        run: |
          cd frontend
          npm run lint

      - name: Run Production Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: |
          cd frontend
          npm run build

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Install Backend Dependencies for E2E
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements-dev.txt

      - name: Run E2E Test Backend Migration
        run: |
          cd backend
          DATABASE_URL=postgresql://pim_user:pim_password@localhost:5432/beauty_pim_test alembic upgrade head

      - name: Start Backend Server
        env:
          SECRET_KEY: testsecretkeytestsecretkeytestsecretkeytestsecretkey
          DATABASE_URL: postgresql://pim_user:pim_password@localhost:5432/beauty_pim_test
        run: |
          cd backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &

      - name: Wait for Backend Health Check
        run: |
          until curl -s http://127.0.0.1:8000/health; do
            echo "Waiting for backend..."
            sleep 1
          done

      - name: Run Playwright E2E Tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  docker-validation:
    name: Docker Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Build Backend Image
        run: |
          docker build -t beauty-pim-backend ./backend
          
      - name: Build Frontend Image
        run: |
          docker build -t beauty-pim-frontend --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 ./frontend
          
      - name: Start Postgres and App Stack
        run: |
          docker network create pim-network
          
          # Start PostgreSQL container
          docker run -d --name test-postgres \
            --network pim-network \
            -e POSTGRES_USER=pim_user \
            -e POSTGRES_PASSWORD=pim_password \
            -e POSTGRES_DB=beauty_pim_test \
            -p 5432:5432 \
            postgres:15-alpine
            
          # Wait for Postgres to be ready
          until docker exec test-postgres pg_isready; do
            echo "Waiting for postgres..."
            sleep 1
          done
          
          # Start Backend container
          docker run -d --name test-backend \
            --network pim-network \
            -e DATABASE_URL=postgresql://pim_user:pim_password@test-postgres:5432/beauty_pim_test \
            -e SECRET_KEY=testsecretkeytestsecretkeytestsecretkeytestsecretkey \
            -p 8000:8000 \
            beauty-pim-backend
            
          # Wait for Backend to start
          sleep 5
          docker logs test-backend
          
          # Start Frontend container
          docker run -d --name test-frontend \
            --network pim-network \
            -p 3000:3000 \
            beauty-pim-frontend
            
          # Wait for Frontend to start
          sleep 5
          docker logs test-frontend
          
      - name: Verify Stack Performance
        run: |
          # 1. Verify backend health endpoint
          resp_back=$(curl -s http://localhost:8000/health)
          echo "Backend Health: $resp_back"
          echo "$resp_back" | grep -q "healthy"
          
          # 2. Verify frontend page returns HTTP 200
          resp_front=$(curl -s -I http://localhost:3000 | head -n 1)
          echo "Frontend HTTP status: $resp_front"
          echo "$resp_front" | grep -E "200|308"
          
          # 3. Confirm backend runtime reports Python 3.11
          py_ver=$(docker exec test-backend python --version)
          echo "Python version: $py_ver"
          echo "$py_ver" | grep -q "3.11"
          
      - name: Stop and Cleanup Containers
        if: always()
        run: |
          docker stop test-frontend test-backend test-postgres || true
          docker rm test-frontend test-backend test-postgres || true
          docker network rm pim-network || true
