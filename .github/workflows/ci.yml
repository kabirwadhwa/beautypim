name: CI/CD Enforcement

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pim_user
          POSTGRES_PASSWORD: pim_password
          POSTGRES_DB: beauty_pim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest-cov pip-audit

      - name: Run Backend Linting
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Dependency Security Scan
        run: |
          pip-audit --desc on

      - name: Run Alembic Migration Upgrade from Empty Database
        env:
          DATABASE_URL: sqlite:///./test_migration.db
        run: |
          cd backend
          alembic upgrade head

      - name: Run SQLite Integration Tests
        env:
          SECRET_KEY: testsecretkeytestsecretkeytestsecretkeytestsecretkey
          DATABASE_URL: sqlite:///./test_beauty_pim.db
        run: |
          cd backend
          pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Run PostgreSQL Integration Tests
        env:
          SECRET_KEY: testsecretkeytestsecretkeytestsecretkeytestsecretkey
          DATABASE_URL: postgresql://pim_user:pim_password@localhost:5432/beauty_pim_test
        run: |
          cd backend
          pytest

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          # Fallback to standard install if package-lock is missing
          npm install

      - name: Run TypeScript Type Check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run Production Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: |
          cd frontend
          npm run build
