# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to use for 'slug' in new revision files
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow scientists to write migration files
# with multiple dependencies
# version_locations =

# version_path_separator = :

# set to 'true' to use PEP 8 formatting on python files
# autogenerate = false

sqlalchemy.url = sqlite:///./beauty_pim.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
